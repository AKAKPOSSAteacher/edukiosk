<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>EduKiosk 2026 - Stable</title>
<style>
    :root { --nv: #0f2044; --gd: #e8a120; --cr: #f5f4f0; --sf: #fff; --bd: #e0dbd2; --mt: #6b6880; --rd: #c0392b; --gn: #1e8449; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--cr); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: var(--sf); padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
    h1 { color: var(--nv); margin-bottom: 0.5rem; font-size: 1.8rem; }
    p { color: var(--mt); font-size: 0.9rem; margin-bottom: 1.5rem; }
    input { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1.5px solid var(--bd); border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; }
    .btn-primary { background: var(--nv); color: white; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .error { background: #fdecea; color: var(--rd); padding: 10px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    #loading-screen { position: fixed; inset: 0; background: var(--cr); display: flex; align-items: center; justify-content: center; z-index: 100; }
</style>
</head>
<body>

<div id="loading-screen">Chargement d'EduKiosk...</div>

<div class="card" id="login-form" style="display:none;">
    <h1>EduKiosk</h1>
    <p>Identifiez-vous pour continuer</p>
    <div id="err-msg" class="error"></div>
    <input type="text" id="username" placeholder="Nom et Prénom">
    <input type="text" id="userclass" placeholder="Classe (ex: 3e2)">
    <input type="text" id="activity-code" placeholder="Code d'activité" maxlength="6" style="text-align:center; font-weight:bold; letter-spacing: 3px;">
    <button class="btn btn-primary" onclick="startActivity()">Commencer</button>
</div>

<script>
    // Initialisation forcée après 500ms pour éviter le freeze
    setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('login-form').style.display = 'block';
    }, 500);

    function startActivity() {
        const name = document.getElementById('username').value.trim();
        const uclass = document.getElementById('userclass').value.trim();
        const code = document.getElementById('activity-code').value.trim();
        const err = document.getElementById('err-msg');

        if (!name || !uclass || code.length < 6) {
            err.textContent = "Veuillez remplir tous les champs correctement.";
            err.style.display = 'block';
            return;
        }

        // Ici, on simule l'entrée en mode kiosque
        document.body.innerHTML = `
            <div style="text-align:center; padding:2rem;">
                <h2 style="color:var(--nv)">Session active : ${name} (${uclass})</h2>
                <div style="background:white; padding:3rem; border-radius:15px; border:2px dashed var(--bd); margin-top:2rem;">
                    Chargement du contenu pour le code <b>${code}</b>...
                </div>
                <button class="btn" style="margin-top:2rem; background:var(--rd); color:white;" onclick="location.reload()">Quitter</button>
            </div>
        `;
        
        // Tentative de plein écran (si supporté)
        try { document.documentElement.requestFullscreen(); } catch(e) {}
    }

    // Sécurité stockage : on vide si c'est corrompu
    try {
        localStorage.setItem('test', '1');
        localStorage.removeItem('test');
    } catch(e) {
        alert("Stockage saturé ou Navigation Privée détectée. EduKiosk risque de mal fonctionner.");
    }
</script>
</body>
</html>
